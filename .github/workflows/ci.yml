name: CI

on:
  push:
    branches: [main, dev, 'feat/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm test -- --exclude 'tests/e2e/l402-flow.integration.test.ts'

